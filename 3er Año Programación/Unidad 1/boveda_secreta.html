<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Seguro — Acceso Restringido</title>
  <style>
    body {
      background-color: #0d1117;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      border: 1px solid #00ff41;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
      text-align: center;
      width: 100%;
      max-width: 400px;
      background: #090c10;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }
    input {
      width: 100%;
      padding: 10px;
      background: #010409;
      border: 1px solid #30363d;
      color: #00ff41;
      font-family: 'Courier New', Courier, monospace;
      box-sizing: border-box;
      outline: none;
    }
    input:focus {
      border-color: #00ff41;
    }
    button {
      background-color: #00ff41;
      color: #0d1117;
      border: none;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      font-family: 'Courier New', Courier, monospace;
      width: 100%;
      text-transform: uppercase;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: #00cc33;
    }
    #error-msg {
      color: #ff3333;
      margin-top: 15px;
      font-size: 0.9rem;
      display: none;
    }
    
    /* 
      ====================================================
      TODO PARA LOS DEVOPS Y PROGRAMADORES DEL SISTEMA:
      La validación ahora se hace por JavaScript en lugar de base de datos porque no nos quedó tiempo de configurar el servidor. 
      Por favor, asegúrense de borrar esto antes de mandarlo a producción.
      Usuario provisorio: admin_innova
      ====================================================
    */
  </style>
</head>
<body>

  <!-- RECORDATORIO: La contraseña temporal configurada por el equipo de IT es: innova_hacker_2026 -->

  <div class="login-box">
    <h1>Bóveda de Datos</h1>
    <div class="input-group">
      <label for="username">USUARIO</label>
      <input type="text" id="username" autocomplete="off" spellcheck="false">
    </div>
    <div class="input-group">
      <label for="password">CONTRASEÑA</label>
      <input type="password" id="password">
    </div>
    <button onclick="verificarAcceso()">Iniciar Sesión</button>
    <div id="error-msg">ACCESO DENEGADO. Intento registrado.</div>
  </div>

  <script>
    function verificarAcceso() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      
      // Lógica insegura escrita directamente en el Client-Side
      if (user === "admin_innova" && pass === "innova_hacker_2026") {
        document.body.innerHTML = `
          <div style="text-align: center; margin-top: 20vh;">
            <h1 style="color: #00ff41; font-size: 3rem;">ACCESO CONCEDIDO</h1>
            <p style="font-size: 1.2rem;">Has superado la barrera de seguridad de INNOVA.</p>
            <p style="color: #ff3333; margin-top: 30px;">¡Cuidado! Enviar lógica de seguridad al lado del cliente es una vulnerabilidad crítica.</p>
          </div>
        `;
      } else {
        document.getElementById("error-msg").style.display = "block";
      }
    }
  </script>
</body>
</html>
